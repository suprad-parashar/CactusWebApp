<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cactus Voice</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">Cactus <span class="title-accent">Voice</span></h1>
      <p class="subtitle">Speak naturally. Actions happen instantly.</p>
    </header>

    <main class="main">
      <div class="mic-area">
        <div class="mic-ring" id="micRing">
          <button class="mic-btn" id="micBtn" aria-label="Hold to speak">
            <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="12" rx="3"/>
              <path d="M5 10a7 7 0 0 0 14 0"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="8" y1="22" x2="16" y2="22"/>
            </svg>
          </button>
        </div>
        <p class="mic-hint" id="micHint">Tap to speak</p>
      </div>

      <div class="status-area" id="statusArea"></div>

      <div class="transcript-area" id="transcriptArea"></div>

      <div class="results-area" id="resultsArea"></div>

      <div class="text-input-area">
        <div class="text-input-wrapper">
          <input type="text" class="text-input" id="textInput" placeholder="Or type a command..." autocomplete="off">
          <button class="send-btn" id="sendBtn" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
